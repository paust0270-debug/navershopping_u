<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'" />
  <title>트래픽 엔진</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <div class="toolbar">
      <button type="button" class="primary" id="btnStart">▶ 시작</button>
      <button type="button" class="danger" id="btnStop">■ 중지</button>
      <button type="button" class="secondary" id="btnSaveConfig">설정 저장</button>
      <button type="button" class="secondary" id="btnSaveResults">결과 저장</button>
      <button type="button" class="secondary" id="btnResetStats">초기화</button>
      <span class="status" id="runnerStatus">대기 중</span>
    </div>

    <div class="main-flex">
      <div class="row-top">
        <div class="panel task-panel">
          <h3>작업 키워드</h3>
          <div class="body">
            <table class="data" id="taskTable">
              <thead>
                <tr>
                  <th style="width:22px">#</th>
                  <th>검색 키워드</th>
                  <th>상품 URL</th>
                  <th title="2차 검색 조합에 사용할 추가 키워드">2차 키워드</th>
                  <th style="width:88px" title="오늘 성공/실패 (자정에 어제로 이월 후 0/0)">트래픽</th>
                  <th style="width:88px" title="어제 성공/실패">어제</th>
                </tr>
              </thead>
              <tbody id="taskBody"></tbody>
            </table>
            <div class="row-tools">
              <button type="button" id="btnAddRow">행 추가</button>
              <button type="button" id="btnDelRow">선택 행 삭제</button>
              <button type="button" class="danger-inline" id="btnClearAllRows">전체 삭제</button>
            </div>
          </div>
        </div>
        <div class="side-col">
          <div class="panel delay-panel">
            <h3>작업 딜레이 (ms)</h3>
            <div class="body">
              <div class="delay-grid" id="delayGrid"></div>
              <div class="delay-grid" style="margin-top:8px">
                <label>최대 스크롤</label>
                <input type="number" id="maxScroll" min="1" value="20" style="grid-column:2/4" />
              </div>
              <div class="delay-grid" style="margin-top:4px">
                <label>워크 모드</label>
                <select id="workMode" class="mode" style="grid-column:2/4">
                  <option value="mobile">Mobile</option>
                  <option value="desktop">Desktop</option>
                  <option value="random">PC+Mobile 랜덤</option>
                </select>
              </div>
            </div>
          </div>
          <div class="row-mid">
            <div class="panel">
              <h3>프록시 · 비행기모드</h3>
              <div class="body" style="display:flex;flex-direction:column;height:100%">
                <div class="checkbox-row">
                  <input type="checkbox" id="proxyEnabled" />
                  <label for="proxyEnabled">프록시 사용</label>
                </div>
                <textarea
                  class="block flex-grow"
                  id="proxyList"
                  placeholder="한 줄에 하나 — http://ip:포트"
                ></textarea>
                <div class="checkbox-row" style="margin-top:6px">
                  <label>작업 전 USB 데이터 OFF→ON: 항상 실행 (고정)</label>
                </div>
              </div>
            </div>
            <div class="panel">
              <h3>User-Agent</h3>
              <div class="body" style="display:flex;flex-direction:column;gap:6px;height:100%">
                <label class="ua-label">Desktop (줄당 1개)</label>
                <textarea class="block flex-grow" id="uaDesktop"></textarea>
                <label class="ua-label">Mobile</label>
                <textarea class="block flex-grow" id="uaMobile"></textarea>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="panel log-wrap">
        <h3>로그</h3>
        <div class="body">
          <textarea class="block log-area" id="logArea" readonly></textarea>
        </div>
      </div>
    </div>
  </div>
  <script src="renderer.js"></script>
</body>
</html>
